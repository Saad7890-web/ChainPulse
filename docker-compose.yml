services:
  postgres:
    image: postgres:16-alpine
    container_name: logistics-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logistics
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
